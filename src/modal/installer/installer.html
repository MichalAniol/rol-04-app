<link rel='stylesheet' type='text/css' href='./installer.css'>

<div id="modal-installer" class="form modal">
    <div class="title">Zainstaluj na urządzeniu</div>

    <button id="modal-installer-btn" class="btn">
        <div class="modal-installer-btn-text">
            <div id="modal-installer-btn-tex">Instaluj</div>

            <!-- użyte z https://magecdn.com/tools/svg-loaders/3-dots-bounce/ -->
            <svg id="modal-installer-btn-loader" width="24" fill="var(--last_color)" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="4" cy="12" r="3">
                    <animate id="spinner_qFRN" begin="0;spinner_OcgL.end+0.25s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                </circle>
                <circle cx="12" cy="12" r="3">
                    <animate begin="spinner_qFRN.begin+0.1s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                </circle>
                <circle cx="20" cy="12" r="3">
                    <animate id="spinner_OcgL" begin="spinner_qFRN.begin+0.2s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                </circle>
            </svg>
        </div>

    </button>

    <button id="modal-installer-btn-no" class="btn">Pomiń</button>
</div>
